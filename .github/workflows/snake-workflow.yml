name: Update Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch:        # lets you trigger it manually too
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate animated profile assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🐍 Snake eats its way through your contribution graph — light + dark
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Amank-123
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      # 📊 Stats card — commits, stars, issues, PRs (light + dark)
      - name: Generate stats card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Amank-123&show_icons=true&hide_border=true&count_private=false
          path: dist/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (dark)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Amank-123&show_icons=true&hide_border=true&count_private=false&theme=dark
          path: dist/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🧠 Top languages card (light + dark)
      - name: Generate top languages card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Amank-123&layout=compact&hide_border=true&langs_count=8
          path: dist/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (dark)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Amank-123&layout=compact&hide_border=true&langs_count=8&theme=dark
          path: dist/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 Streak stats — animated by default (light + dark)
      - name: Generate streak stats (light)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Amank-123&hide_border=true
          path: dist/streak-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats (dark)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Amank-123&hide_border=true&theme=tokyonight
          path: dist/streak-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🏆 Trophy case
      - name: Generate trophies
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Amank-123
          output_path: dist/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🚀 Push everything to the output branch in one go
      - name: Push generated assets to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
